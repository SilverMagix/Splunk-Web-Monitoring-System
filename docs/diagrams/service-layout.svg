  <text class="label" x="140" y="177">main.py</text>
  <rect class="box" x="60" y="225" width="160" height="44"/>
  <text class="label" x="140" y="252">generator.py</text>
  <path class="edge" d="M140 119 V150"/>
  <path class="edge" d="M100 119 V247 H60"/>
  <path class="edge" d="M140 269 H140 300"/>
  <text class="edgeLabel" x="200" y="262">HTTP</text>

  <rect class="group" x="300" y="30" width="220" height="200"/>
  <text class="groupTitle" x="315" y="52">monitoring-service</text>
  <rect class="box" x="325" y="75" width="170" height="44"/>
  <text class="label" x="410" y="102">main.py</text>
  <rect class="box" x="325" y="150" width="170" height="44"/>
  <text class="label" x="410" y="177">splunk_client.py</text>
  <path class="edge" d="M410 119 V150"/>

  <path class="edge" d="M220 172 H325"/>
  <text class="edgeLabel" x="270" y="162">POST /ingest</text>

  <rect class="group" x="580" y="30" width="280" height="250"/>
  <text class="groupTitle" x="595" y="52">dashboard</text>
  <rect class="box" x="605" y="75" width="230" height="44"/>
  <text class="label" x="720" y="102">static/ UI + Chart.js</text>
  <rect class="box" x="605" y="145" width="230" height="44"/>
  <text class="label" x="720" y="172">main.py</text>
